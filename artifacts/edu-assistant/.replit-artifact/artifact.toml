kind = "web"
previewPath = "/"
title = "AI Education Assistant"
version = "1.0.0"
id = "artifacts/edu-assistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19373

[services.development]
run = "pnpm --filter @workspace/edu-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edu-assistant", "run", "build" ]
publicDir = "artifacts/edu-assistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19373"
BASE_PATH = "/"
